---
# Target server
target_host_ip: 203.0.113.10
target_host_user: ubuntu

# Leave both values empty only if you intentionally want plain HTTP by IP.
keycloak_domain: keycloak.example.com
letsencrypt_email: you@example.com

# Core credentials
keycloak_admin_user: admin
keycloak_admin_password: "change-me"
keycloak_postgres_password: "change-me"

# Main realm
keycloak_realm_name: a8s
keycloak_realm_display_name: A8S
keycloak_realm_login_theme: keycloakify-starter

# Realm login / registration settings
keycloak_realm_login_settings:
  registration_allowed: true
  reset_password_allowed: true
  remember_me: true
  registration_email_as_username: false
  login_with_email_allowed: true
  duplicate_emails_allowed: false
  verify_email: true
  edit_username_allowed: false

# Realm session settings
keycloak_realm_session_settings:
  sso_session_idle_timeout: 28800 # 8 hours
  sso_session_max_lifespan: 28800 # 8 hours
  sso_session_idle_timeout_remember_me: ""
  sso_session_max_lifespan_remember_me: ""
  client_session_idle_timeout: 28800 # 8 hours
  client_session_max_lifespan: 28800 # 8 hours
  offline_session_idle_timeout: 2592000 # 30 days
  offline_session_max_lifespan_enabled: false
  offline_session_max_lifespan: ""
  login_timeout: 60 # 1 minute
  login_action_timeout: 300 # 5 minutes

# Realm token settings
keycloak_realm_token_settings:
  default_signature_algorithm: RS256
  oauth2_device_code_lifespan: 600
  oauth2_device_polling_interval: 5
  par_request_uri_lifespan: 60
  revoke_refresh_token: false
  refresh_token_max_reuse: 0
  access_token_lifespan: 300 # 5 minutes
  access_token_lifespan_for_implicit_flow: 900
  client_login_timeout: 600 # 10 minutes
  user_initiated_action_lifespan: 300
  admin_initiated_action_lifespan: 43200

# Realm email / SMTP
# For Gmail, use an App Password here, not your normal account password.
keycloak_realm_smtp:
  enabled: true
  from: noreply@example.com
  from_display_name: Example App
  reply_to: ""
  reply_to_display_name: ""
  envelope_from: ""
  host: smtp.gmail.com
  port: "587"
  ssl: false
  starttls: true
  auth: true
  user: noreply@example.com
  password: "REPLACE_ME_GMAIL_APP_PASSWORD"
  debug: false

# Permanent server admin for the Keycloak master realm.
# Log in with this user to avoid the temporary-admin warning banner.
keycloak_master_realm_admin_users:
  - username: kc-admin
    first_name: Keycloak
    last_name: Admin
    email: admin@example.com
    enabled: true
    email_verified: true
    password: "change-me"
    temporary_password: false
    realm_roles:
      - admin

# Social login providers
keycloak_identity_providers:
  - alias: github
    provider_id: github
    display_name: Github
    enabled: true
    client_id: REPLACE_ME_GITHUB_CLIENT_ID
    client_secret: REPLACE_ME_GITHUB_CLIENT_SECRET
    store_token: true
    accepts_prompt_none_forward_from_client: false
    disable_user_info: false
    trust_email: true
    link_only: false
    hide_on_login: false
    verify_essential_claim: false
    sync_mode: LEGACY
    case_sensitive_original_username: false
  - alias: gitlab
    provider_id: gitlab
    display_name: Gitlab
    enabled: true
    client_id: REPLACE_ME_GITLAB_CLIENT_ID
    client_secret: REPLACE_ME_GITLAB_CLIENT_SECRET
    default_scope: "read_user email"
    store_token: true
    accepts_prompt_none_forward_from_client: false
    disable_user_info: false
    trust_email: true
    link_only: false
    hide_on_login: false
    verify_essential_claim: false
    sync_mode: IMPORT
    case_sensitive_original_username: false
  - alias: google
    provider_id: google
    display_name: Google
    enabled: true
    client_id: REPLACE_ME_GOOGLE_CLIENT_ID
    client_secret: REPLACE_ME_GOOGLE_CLIENT_SECRET
    prompt: ""
    hosted_domain: ""
    user_ip: false
    offline_access: false
    store_token: false
    accepts_prompt_none_forward_from_client: false
    disable_user_info: false
    trust_email: true
    link_only: false
    hide_on_login: false
    verify_essential_claim: false
    sync_mode: LEGACY
    case_sensitive_original_username: false

# Realm bootstrap
keycloak_realm_users:
  - username: a8s-admin
    first_name: A8S
    last_name: Admin
    email: admin@example.com
    enabled: true
    email_verified: true
    password: "change-me"
    temporary_password: false
    client_roles:
      realm-management:
        - realm-admin

# Client bootstrap
keycloak_clients:
  - client_id: a8s-frontend
    name: a8s-frontend
    description: ""
    enabled: true
    always_display_in_ui: false
    client_authenticator_type: client-secret
    public_client: false
    standard_flow_enabled: true
    direct_access_grants_enabled: false
    implicit_flow_enabled: false
    service_accounts_enabled: false
    authorization_services_enabled: false
    client_secret: ""
    root_url: https://app.example.com
    home_url: https://app.example.com
    admin_url: ""
    redirect_uris:
      - https://app.example.com/api/auth/callback/keycloak
    post_logout_redirect_uris: https://app.example.com/*
    web_origins:
      - https://app.example.com
    frontchannel_logout: true
    frontchannel_logout_session_required: true
    pkce_code_challenge_method: S256
    standard_token_exchange_enabled: false
    oauth2_device_authorization_grant_enabled: false
    oidc_ciba_grant_enabled: false
  - client_id: a8s-frontend-local
    name: a8s-frontend-local
    description: ""
    enabled: true
    always_display_in_ui: false
    client_authenticator_type: client-secret
    public_client: false
    standard_flow_enabled: true
    direct_access_grants_enabled: false
    implicit_flow_enabled: false
    service_accounts_enabled: false
    authorization_services_enabled: false
    client_secret: ""
    root_url: http://localhost:3000
    home_url: http://localhost:3000
    admin_url: ""
    redirect_uris:
      - http://localhost:3000/api/auth/callback/keycloak
    post_logout_redirect_uris: http://localhost:3000/*
    web_origins:
      - http://localhost:3000
    frontchannel_logout: true
    frontchannel_logout_session_required: true
    pkce_code_challenge_method: S256
    standard_token_exchange_enabled: false
    oauth2_device_authorization_grant_enabled: false
    oidc_ciba_grant_enabled: false

# Deployment behavior
keycloak_stack_state: present
keycloak_debug_identity_providers: false
keycloak_debug_clients: false
keycloak_tls_expected_ips: []

# Keycloak replica / clustering settings
keycloak_replica_count: 2
keycloak_cache_mode: ispn
# For this Docker / shared-DB setup, jdbc-ping is the right stack.
# Do not use the kubernetes stack here unless you actually deploy on Kubernetes with DNS_PING.
keycloak_cache_stack: jdbc-ping
keycloak_enable_sticky_sessions: true

# Destroy behavior
keycloak_destroy_remove_volumes: true
keycloak_destroy_remove_project_dir: true
keycloak_destroy_remove_tls_assets: true
keycloak_destroy_restore_default_nginx_site: true

# Advanced connection settings
target_host_port: 22
target_host_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519"
target_host_ssh_config_file: "{{ lookup('env', 'HOME') }}/.ssh/config"
target_host_ssh_common_args: ""
target_host_remote_tmp: "/tmp/.ansible-{{ target_host_user }}/tmp"

# Advanced Keycloak settings
keycloak_project_dir: /opt/keycloak-postgres-docker
keycloak_db_name: db_keycloak
keycloak_db_user: postgres
# Base host port for the first Keycloak replica. Additional replicas use the next ports.
keycloak_http_port: 9090
keycloak_provider_jar: "{{ playbook_dir }}/provider/keycloak-theme-for-kc-all-other-versions.jar"
keycloak_theme_jar: ""
keycloak_readiness_path: /realms/master/.well-known/openid-configuration
keycloak_realm_ssl_required: "{{ 'external' if ((keycloak_domain | length > 0) and (letsencrypt_email | length > 0)) else 'none' }}"

# Local generated files
generated_secret_dir: "{{ playbook_dir }}/.ansible/generated"

# Package lists
keycloak_os_packages:
  - ca-certificates
  - certbot
  - curl
  - gnupg
  - nginx
  - python3-certbot-nginx

docker_packages:
  - containerd.io
  - docker-buildx-plugin
  - docker-ce
  - docker-ce-cli
  - docker-compose-plugin

docker_arch_map:
  x86_64: amd64
  aarch64: arm64
