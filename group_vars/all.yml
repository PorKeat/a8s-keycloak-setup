---

# Target server
target_host_ip: 35.197.138.156
target_host_user: github-actions

# Leave both values empty only if you intentionally want plain HTTP by IP.
keycloak_domain: keycloak.autonomous-istad.com
letsencrypt_email: alexkgm2412@gmail.com

# Core credentials
keycloak_admin_user: admin
keycloak_admin_password: "1234"
keycloak_postgres_password: "1234"

# Main realm
keycloak_realm_name: a8s
keycloak_realm_display_name: A8S
keycloak_realm_login_theme: keycloakify-starter

# Realm email / SMTP
# For Gmail, use an App Password here, not your normal account password.
keycloak_realm_smtp:
  enabled: true
  from: autonomous.istad@gmail.com
  from_display_name: Autonomous
  reply_to: ""
  reply_to_display_name: ""
  envelope_from: ""
  host: smtp.gmail.com
  port: "587"
  ssl: false
  starttls: true
  auth: true
  user: autonomous.istad@gmail.com
  password: 12345678
  debug: false


# Permanent server admin for the Keycloak master realm.
# Log in with this user to avoid the temporary-admin warning banner.
keycloak_master_realm_admin_users:
  - username: kc-admin
    first_name: Keycloak
    last_name: Admin
    email: admin@autonomous-istad.com
    enabled: true
    email_verified: true
    password: "1234"
    temporary_password: false
    realm_roles:
      - admin


# IMPORTANT: Replace social login secrets before using identity providers
keycloak_identity_providers:
  - alias: github
    provider_id: github
    display_name: Github
    enabled: true
    client_id: Ov23li0qvURMpiCMoVmh
    client_secret: REPLACE_ME_GITHUB_CLIENT_SECRET
    store_token: true
    accepts_prompt_none_forward_from_client: false
    disable_user_info: false
    trust_email: true
    link_only: false
    hide_on_login: false
    verify_essential_claim: false
    sync_mode: LEGACY
    case_sensitive_original_username: false
  - alias: gitlab
    provider_id: gitlab
    display_name: Gitlab
    enabled: true
    client_id: 17f6c4bd9849af4ea228c8eef5c4da173b2382bfe947732794473ab06f84250d
    client_secret: REPLACE_ME_GITLAB_CLIENT_SECRET
    default_scope: "read_user email"
    store_token: true
    accepts_prompt_none_forward_from_client: false
    disable_user_info: false
    trust_email: true
    link_only: false
    hide_on_login: false
    verify_essential_claim: false
    sync_mode: IMPORT
    case_sensitive_original_username: false
  - alias: google
    provider_id: google
    display_name: Google
    enabled: true
    client_id: 84196592547-ft20gl99uemj6f68qsuf1a6l92u10m8o.apps.googleusercontent.com
    client_secret: REPLACE_ME_GOOGLE_CLIENT_SECRET
    prompt: ""
    hosted_domain: ""
    user_ip: false
    offline_access: false
    store_token: false
    accepts_prompt_none_forward_from_client: false
    disable_user_info: false
    trust_email: true
    link_only: false
    hide_on_login: false
    verify_essential_claim: false
    sync_mode: LEGACY
    case_sensitive_original_username: false


# Realm bootstrap
keycloak_realm_users:
  - username: a8s-admin
    first_name: A8S
    last_name: Admin
    email: "admin@a8s.cambostack.app"
    enabled: true
    email_verified: true
    password: "1234"
    temporary_password: false
    client_roles:
      realm-management:
        - realm-admin


# Client bootstrap
keycloak_clients:
  - client_id: a8s-frontend
    name: a8s-frontend
    description: ""
    enabled: true
    always_display_in_ui: false
    client_authenticator_type: client-secret
    public_client: false
    standard_flow_enabled: true
    direct_access_grants_enabled: false
    implicit_flow_enabled: false
    service_accounts_enabled: false
    authorization_services_enabled: false
    root_url: https://a8s.cambostack.app
    home_url: https://a8s.cambostack.app
    admin_url: ""
    redirect_uris:
      - https://a8s.cambostack.app/api/auth/callback/keycloak
    post_logout_redirect_uris: https://a8s.cambostack.app/*
    web_origins:
      - https://a8s.cambostack.app
    frontchannel_logout: true
    frontchannel_logout_session_required: true
    pkce_code_challenge_method: S256
    standard_token_exchange_enabled: false
    oauth2_device_authorization_grant_enabled: false
    oidc_ciba_grant_enabled: false
  - client_id: a8s-frontend-local
    name: a8s-frontend-local
    description: ""
    enabled: true
    always_display_in_ui: false
    client_authenticator_type: client-secret
    public_client: false
    standard_flow_enabled: true
    direct_access_grants_enabled: false
    implicit_flow_enabled: false
    service_accounts_enabled: false
    authorization_services_enabled: false
    root_url: http://localhost:3000
    home_url: http://localhost:3000
    admin_url: ""
    redirect_uris:
      - http://localhost:3000/api/auth/callback/keycloak
    post_logout_redirect_uris: http://localhost:3000/*
    web_origins:
      - http://localhost:3000
    frontchannel_logout: true
    frontchannel_logout_session_required: true
    pkce_code_challenge_method: S256
    standard_token_exchange_enabled: false
    oauth2_device_authorization_grant_enabled: false
    oidc_ciba_grant_enabled: false


# Deployment behavior
keycloak_stack_state: present
keycloak_debug_identity_providers: false
keycloak_tls_expected_ips: []


# Destroy behavior
keycloak_destroy_remove_volumes: true
keycloak_destroy_remove_project_dir: true
keycloak_destroy_remove_tls_assets: true
keycloak_destroy_restore_default_nginx_site: true


# Advanced connection settings
target_host_port: 22
target_host_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/github-actions-key"
target_host_ssh_config_file: "{{ lookup('env', 'HOME') }}/.ssh/config"
target_host_ssh_common_args: ""
target_host_remote_tmp: "/tmp/.ansible-{{ target_host_user }}/tmp"


# Advanced Keycloak settings
keycloak_project_dir: /opt/keycloak-postgres-docker
keycloak_db_name: db_keycloak
keycloak_db_user: postgres
keycloak_http_port: 9090
keycloak_provider_jar: "{{ playbook_dir }}/provider/keycloak-theme-for-kc-all-other-versions.jar"
keycloak_theme_jar: ""
keycloak_readiness_path: /realms/master/.well-known/openid-configuration
keycloak_realm_ssl_required: "{{ 'external' if ((keycloak_domain | length > 0) and (letsencrypt_email | length > 0)) else 'none' }}"


# Local generated files
generated_secret_dir: "{{ playbook_dir }}/.ansible/generated"


# Package lists
keycloak_os_packages:
  - ca-certificates
  - certbot
  - curl
  - gnupg
  - nginx
  - python3-certbot-nginx

docker_packages:
  - containerd.io
  - docker-buildx-plugin
  - docker-ce
  - docker-ce-cli
  - docker-compose-plugin

docker_arch_map:
  x86_64: amd64
  aarch64: arm64
