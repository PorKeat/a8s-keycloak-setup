---
- name: Install OS packages
  ansible.builtin.apt:
    name: "{{ keycloak_os_packages }}"
    state: present
    update_cache: true

- name: Ensure the Docker keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install the Docker repository signing key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Configure the Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_arch_map[ansible_facts['architecture']] | default('amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable"
    filename: docker
    state: present
    update_cache: true

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present

- name: Ensure Docker is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Ensure Nginx is enabled and running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Allow the SSH user to manage Docker without sudo later
  ansible.builtin.user:
    name: "{{ ansible_user | default(ansible_facts['user_id']) }}"
    groups: docker
    append: true
  when: (ansible_user | default(ansible_facts['user_id'])) != 'root'
